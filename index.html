}

// ─── SUB-COMPONENTS ───────────────────────────────────────────────────────────
function TaskRow({task,clients,categories,catMap,onToggle,onDelete,onEdit,timerDisplay,onStartTimer,onStopTimer,onToggleSubtask}){
  const cat=catMap[task.category]||categories[0]||{label:"?",color:"#888",bg:"#1a1a1a",icon:"📌"};
  const pri=PRIORITIES[task.priority]||PRIORITIES.medium;
  const d=daysUntil(task.dueDate);
  const dl=dayLabel(d);
  const cl=clients.find(c=>c.id===task.clientId);
  const [expanded,setExpanded]=useState(false);
  const [swipeX,setSwipeX]=useState(0);
  const [swiping,setSwiping]=useState(false);
  const startXRef=useRef(0);
  const handleTouchStart=e=>{startXRef.current=e.touches[0].clientX;setSwiping(true);};
  const handleTouchMove=e=>{setSwipeX(Math.max(-90,Math.min(90,e.touches[0].clientX-startXRef.current)));};
  const handleTouchEnd=()=>{if(swipeX<-60)onDelete(task.id);else if(swipeX>60)onToggle(task.id);setSwipeX(0);setSwiping(false);};
  const showLeft=swipeX>20,showRight=swipeX<-20;
  const hasSubtasks=(task.subtasks||[]).length>0;
  const completedSubs=(task.subtasks||[]).filter(s=>s.done).length;

  return(
    <div style={{position:"relative",overflow:"hidden",borderRadius:12,marginBottom:8}}>
      <div style={{position:"absolute",inset:0,borderRadius:12,background:showLeft?"#0e2e0e":showRight?"#2e0e0e":"transparent",display:"flex",alignItems:"center",justifyContent:showLeft?"flex-start":showRight?"flex-end":"center",padding:"0 18px",pointerEvents:"none"}}>
        {showLeft&&<span style={{fontSize:18,color:"var(--green)",fontWeight:700}}>✓</span>}
        {showRight&&<span style={{fontSize:18,color:"var(--red)",fontWeight:700}}>✕</span>}
      </div>
      <div onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd} style={{transform:`translateX(${swipeX}px)`,transition:swiping?"none":"transform .2s ease"}} className="card-sm">
        <div style={{display:"flex",alignItems:"flex-start",gap:10,opacity:task.done?.4:1}}>
          <div className={`cb${task.done?" on":""}`} style={{marginTop:2}} onClick={()=>onToggle(task.id)}>
            {task.done&&<span style={{fontSize:10,color:"#0d0d10",fontWeight:900}}>✓</span>}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:600,fontSize:14,color:task.done?"var(--text3)":"var(--text)",textDecoration:task.done?"line-through":"none",marginBottom:4,lineHeight:1.3,cursor:hasSubtasks?"pointer":"default"}} onClick={()=>hasSubtasks&&setExpanded(e=>!e)}>
              {task.title}
              {hasSubtasks&&<span style={{fontSize:11,color:"var(--text3)",marginLeft:6}}>({completedSubs}/{task.subtasks.length})</span>}
            </div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:4}}>
              <span className="pill" style={{background:cat.bg,color:cat.color}}>{cat.icon} {cat.label}</span>
              <span className="pill" style={{background:"#1a1014",color:pri.color}}>● {pri.label}</span>
              {(task.tags||[]).map(g=><span key={g} className="tag">#{g}</span>)}
            </div>
            <div style={{fontSize:12,color:"var(--text3)",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              <span>📅 {fmtDate(task.dueDate)}{task.time?` · ${task.time}`:""}</span>
              {cl&&<span>👤 {cl.name}</span>}
              {!task.done&&<span style={{color:dl.color,fontWeight:600}}>{dl.text}</span>}
              {timerDisplay&&<span style={{color:timerDisplay.running?"var(--red)":"var(--green)",fontWeight:600}}>⏱ {timerDisplay.display}</span>}
            </div>
            {task.recurrence&&<div style={{fontSize:11,color:"var(--ai-light)",marginTop:2}}>🔁 {task.recurrence}</div>}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
            <div style={{display:"flex",gap:4}}>
              <button className="btn btn-ghost btn-sm" style={{padding:"5px 8px",fontSize:12}} onClick={()=>onEdit(task)}>✏️</button>
              <button className="btn btn-red btn-sm" style={{padding:"5px 8px",fontSize:12}} onClick={()=>onDelete(task.id)}>✕</button>
            </div>
            {timerDisplay?(
              timerDisplay.running
                ?<button className="timer-btn timer-running" onClick={()=>onStopTimer(task.id)}>⏹ Stop</button>
                :<button className="timer-btn" onClick={()=>onStartTimer(task.id)}>▶ Timer</button>
            ):(
              <button className="timer-btn" onClick={()=>onStartTimer(task.id)}>▶ Timer</button>
            )}
          </div>
        </div>
        {expanded&&hasSubtasks&&(
          <div style={{paddingLeft:32,marginTop:6,borderTop:"1px solid var(--border)",paddingTop:6}}>
            {task.subtasks.map(sub=>(
              <div key={sub.id} className="subtask-row">
                <div className={`subtask-check${sub.done?" done":""}`} onClick={()=>onToggleSubtask&&onToggleSubtask(task.id,sub.id)}>
                  {sub.done&&"✓"}
                </div>
                <span style={{fontSize:13,textDecoration:sub.done?"line-through":"none",color:sub.done?"var(--text3)":"var(--text)"}}>{sub.title}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function TaskModal({clients,categories,settings,task,onClose,onSave,isEdit}){
  const [f,setF]=useState(task||{title:"",category:categories[0]?.id||"",priority:"medium",dueDate:"",time:"",clientId:"",notes:"",tags:[],subtasks:[],recurrence:""});
  const [tagInput,setTagInput]=useState("");
  const [newSub,setNewSub]=useState("");
  const sv=(k,v)=>setF(x=>({...x,[k]:v}));
  const addTag=()=>{const t=tagInput.trim().replace(/^#/,"");if(t&&!(f.tags||[]).includes(t)){sv("tags",[...(f.tags||[]),t]);setTagInput("");}};
  const removeTag=t=>sv("tags",(f.tags||[]).filter(x=>x!==t));
  const addSub=()=>{const t=newSub.trim();if(t){sv("subtasks",[...(f.subtasks||[]),{id:uid(),title:t,done:false}]);setNewSub("");}};
  const labels=settings.labels||DEFAULT_SETTINGS.labels;

  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-border-mobile">
        <div className="modal-header">
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20}}>{isEdit?"Edit":"New"} {labels.tasks?.replace(/s$/,"")||"Task"}</h2>
          <button className="btn btn-ghost btn-sm" style={{padding:"5px 10px"}} onClick={onClose}>✕</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div><div className="lbl">Title *</div><input className="input" value={f.title} onChange={e=>sv("title",e.target.value)} placeholder="Task title…"/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><div className="lbl">Category</div><select className="select" value={f.category} onChange={e=>sv("category",e.target.value)}>{categories.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}</select></div>
            <div><div className="lbl">Priority</div><select className="select" value={f.priority} onChange={e=>sv("priority",e.target.value)}>{Object.entries(PRIORITIES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><div className="lbl">Due Date *</div><input className="input" type="date" value={f.dueDate} onChange={e=>sv("dueDate",e.target.value)}/></div>
            <div><div className="lbl">Time</div><input className="input" type="time" value={f.time||""} onChange={e=>sv("time",e.target.value)}/></div>
          </div>
          <div><div className="lbl">{labels.clients||"Client"}</div><select className="select" value={f.clientId||""} onChange={e=>sv("clientId",e.target.value)}><option value="">— None —</option>{clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
          <div><div className="lbl">Recurrence</div>
            <select className="select" value={f.recurrence||""} onChange={e=>sv("recurrence",e.target.value)}>
              <option value="">None</option><option value="Daily">Daily</option><option value="Weekly">Weekly</option><option value="Fortnightly">Fortnightly</option><option value="Monthly">Monthly</option><option value="Quarterly">Quarterly</option>
            </select>
          </div>
          {/* Tags */}
          <div>
            <div className="lbl">Tags</div>
            <div style={{display:"flex",gap:6,marginBottom:6,flexWrap:"wrap"}}>
              {(f.tags||[]).map(t=><span key={t} className="tag" style={{cursor:"pointer"}} onClick={()=>removeTag(t)}>#{t} ✕</span>)}
            </div>
            <div style={{display:"flex",gap:6}}>
              <input className="input" style={{flex:1,fontSize:13}} placeholder="#tag…" value={tagInput} onChange={e=>setTagInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addTag();}}}/>
              <button className="btn btn-ghost btn-sm" onClick={addTag}>Add</button>
            </div>
          </div>
          {/* Subtasks */}
          <div>
            <div className="lbl">Subtasks / Checklist</div>
            {(f.subtasks||[]).map((sub,i)=>(
              <div key={sub.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <div className={`subtask-check${sub.done?" done":""}`} onClick={()=>sv("subtasks",f.subtasks.map(s=>s.id===sub.id?{...s,done:!s.done}:s))}>{sub.done&&"✓"}</div>
                <span style={{flex:1,fontSize:13,textDecoration:sub.done?"line-through":"none"}}>{sub.title}</span>
                <button className="btn btn-red btn-sm" style={{padding:"3px 7px",fontSize:11}} onClick={()=>sv("subtasks",f.subtasks.filter(s=>s.id!==sub.id))}>✕</button>
              </div>
            ))}
            <div style={{display:"flex",gap:6}}>
              <input className="input" style={{flex:1,fontSize:13}} placeholder="Add subtask…" value={newSub} onChange={e=>setNewSub(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addSub();}}}/>
              <button className="btn btn-ghost btn-sm" onClick={addSub}>+</button>
            </div>
          </div>
          <div><div className="lbl">Notes</div><textarea className="input" value={f.notes||""} onChange={e=>sv("notes",e.target.value)} placeholder="Details…"/></div>
        </div>
        <div style={{display:"flex",gap:9,marginTop:18}}>
          <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Cancel</button>
          <button className="btn btn-gold" style={{flex:2}} onClick={()=>f.title&&f.dueDate&&onSave(f)}>{isEdit?"Save Changes":"Add"}</button>
        </div>
      </div>
    </div>
  );
}

    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>

          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20}}>{isEdit?"Edit Renewal":"New Renewal"}</h2>
          <button className="btn btn-ghost btn-sm" style={{padding:"5px 10px"}} onClick={onClose}>✕</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div><div className="lbl">Client</div><select className="select" value={f.clientId} onChange={e=>sv("clientId",e.target.value)}><option value="">— None —</option>{clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
          <div><div className="lbl">Service / Contract *</div><input className="input" value={f.service} onChange={e=>sv("service",e.target.value)} placeholder="Service or contract name"/></div>

            <div><div className="lbl">Bill Client ({cur})</div><input className="input" type="number" value={f.billingAmount} onChange={e=>sv("billingAmount",e.target.value)}/></div>

          {f.billingAmount&&<div style={{background:"var(--bg3)",borderRadius:8,padding:"10px 12px",fontSize:14,color:"var(--green)"}}>Profit: <strong>{cur}{profit.toFixed(2)}</strong></div>}
          <div><div className="lbl">Renewal Date *</div><input className="input" type="date" value={f.renewalDate} onChange={e=>sv("renewalDate",e.target.value)}/></div>
          <div><div className="lbl">Notes</div><input className="input" value={f.notes} onChange={e=>sv("notes",e.target.value)} placeholder="Optional notes"/></div>
        </div>
        <div style={{display:"flex",gap:9,marginTop:18}}>
          <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Cancel</button>
          <button className="btn btn-gold" style={{flex:2}} onClick={()=>f.service&&f.renewalDate&&onSave({...f,cost:parseFloat(f.cost)||0,billingAmount:parseFloat(f.billingAmount)||0})}>{isEdit?"Save Changes":"Add Renewal"}</button>
        </div>
      </div>
    </div>
  );
}

  const [f,setF]=useState(client||{name:"",email:"",phone:"",type:(settings.clientTypes||[])[0]?.id||"ct1",notes:"",customFields:[]});
  const sv=(k,v)=>setF(x=>({...x,[k]:v}));
  const addCF=()=>setF(x=>({...x,customFields:[...(x.customFields||[]),{id:uid(),label:"Field",value:""}]}));
  const labels=settings.labels||DEFAULT_SETTINGS.labels;
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-border-mobile">
        <div className="modal-header">
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20}}>{isEdit?"Edit":"New"} {labels.clients?.replace(/s$/,"")||"Client"}</h2>
          <button className="btn btn-ghost btn-sm" style={{padding:"5px 10px"}} onClick={onClose}>✕</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div><div className="lbl">Name *</div><input className="input" value={f.name} onChange={e=>sv("name",e.target.value)} placeholder="Name"/></div>
          <div><div className="lbl">Email</div><input className="input" type="email" value={f.email||""} onChange={e=>sv("email",e.target.value)} placeholder="email@example.com"/></div>
          <div><div className="lbl">Phone</div><input className="input" type="tel" value={f.phone||""} onChange={e=>sv("phone",e.target.value)} placeholder="Phone number"/></div>
          <div><div className="lbl">Type</div><select className="select" value={f.type||""} onChange={e=>sv("type",e.target.value)}>{(settings.clientTypes||[]).map(ct=><option key={ct.id} value={ct.id}>{ct.icon} {ct.label}</option>)}</select></div>
          {/* Custom fields */}

            <div key={cf.id} style={{display:"flex",gap:6,alignItems:"center"}}>

              <input value={cf.value} onChange={e=>sv("customFields",f.customFields.map(x=>x.id===cf.id?{...x,value:e.target.value}:x))} style={{flex:1,background:"var(--input-bg)",border:"1px solid var(--border)",borderRadius:8,padding:"8px 10px",color:"var(--text)",fontSize:13,outline:"none"}} placeholder="Value"/>
              <button className="btn btn-red btn-sm" style={{padding:"7px 10px"}} onClick={()=>sv("customFields",f.customFields.filter(x=>x.id!==cf.id))}>✕</button>
            </div>
          ))}
          <button className="btn btn-ghost btn-full btn-sm" onClick={addCF}>+ Custom Field</button>
          <div><div className="lbl">Notes</div><textarea className="input" value={f.notes||""} onChange={e=>sv("notes",e.target.value)} placeholder="Any notes…"/></div>
        </div>
        <div style={{display:"flex",gap:9,marginTop:18}}>
          <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Cancel</button>
          <button className="btn btn-gold" style={{flex:2}} onClick={()=>f.name&&onSave(f)}>{isEdit?"Save Changes":"Add"}</button>
        </div>
      </div>
    </div>
  );
}

// ── Pull-to-refresh block ──────────────────────────────────────────────────────
(function(){
  let startY=0,startScrollTop=0,scrollEl=null;
  document.addEventListener('touchstart',function(e){startY=e.touches[0].clientY;scrollEl=null;startScrollTop=0;let el=e.target;while(el&&el!==document.documentElement){const oy=window.getComputedStyle(el).overflowY;if((oy==='auto'||oy==='scroll')&&el.scrollHeight>el.clientHeight){scrollEl=el;startScrollTop=el.scrollTop;break;}el=el.parentElement;}},{passive:true});
  document.addEventListener('touchmove',function(e){if(!scrollEl){e.preventDefault();return;}if(startScrollTop<=0&&scrollEl.scrollTop<=0&&e.touches[0].clientY-startY>5)e.preventDefault();},{passive:false});
})();

if("serviceWorker"in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{});});}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
